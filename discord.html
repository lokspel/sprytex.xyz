<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Meta redirect as HTML-level fallback -->
    <meta http-equiv="refresh" content="5; url=https://discord.com/invite/3FEx6jzQwy">

    <meta name="robots" content="noindex, nofollow">
    <title>Redirecting…</title>
</head>
<body>
    <script>
        // Fast JS redirect (main path)
        setTimeout(function () {
            window.location.replace("https://discord.com/invite/3FEx6jzQwy");
        }, 100);
    </script>

    <noscript>
        <!-- No‑JS fallback -->
        <meta http-equiv="refresh" content="0; url=https://discord.com/invite/3FEx6jzQwy">
    </noscript>
</body>
</html>
